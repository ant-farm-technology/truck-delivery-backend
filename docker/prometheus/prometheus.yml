global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: truck-delivery
    environment: development

rule_files: []

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # ── .NET Services (ASP.NET Core Prometheus exporter) ──
  # Thêm mỗi service khi deploy — format: {service-name}:{port}

  - job_name: identity-service
    metrics_path: /metrics
    static_configs:
      - targets: [identity-service:8080]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets: [order-service:8080]

  - job_name: driver-service
    metrics_path: /metrics
    static_configs:
      - targets: [driver-service:8080]

  - job_name: shipment-service
    metrics_path: /metrics
    static_configs:
      - targets: [shipment-service:8080]

  - job_name: tracking-service
    metrics_path: /metrics
    static_configs:
      - targets: [tracking-service:8080]

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: [notification-service:8080]

  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets: [payment-service:8080]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: [api-gateway:8080]

  # ── Rust Services ──────────────────────────────────────

  - job_name: route-service
    metrics_path: /metrics
    static_configs:
      - targets: [route-service:8080]

  # ── Python Services ────────────────────────────────────

  - job_name: routing-optimizer
    metrics_path: /metrics
    static_configs:
      - targets: [routing-optimizer:8080]

  # ── Kafka ──────────────────────────────────────────────
  # Uncomment khi thêm kafka-exporter

  # - job_name: kafka
  #   static_configs:
  #     - targets: [kafka-exporter:9308]
