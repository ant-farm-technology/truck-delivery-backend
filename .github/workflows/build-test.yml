name: Build & Unit Tests

on:
  push:
    branches: [develop, main, master]
  pull_request:
    branches: [develop, main, master]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore TruckDelivery.slnx

      - name: Build (Release)
        run: dotnet build TruckDelivery.slnx --no-restore -c Release

  unit-tests:
    name: Unit Tests — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false        # all projects report independently
      matrix:
        include:
          - project: Order.Domain
            path: tests/Unit/TruckDelivery.Order.Domain.Tests/TruckDelivery.Order.Domain.Tests.csproj
            trx: order-results.trx
          - project: Driver.Domain
            path: tests/Unit/TruckDelivery.Driver.Domain.Tests/TruckDelivery.Driver.Domain.Tests.csproj
            trx: driver-results.trx
          - project: Shipment.Domain
            path: tests/Unit/TruckDelivery.Shipment.Domain.Tests/TruckDelivery.Shipment.Domain.Tests.csproj
            trx: shipment-results.trx
          - project: Payment.Domain
            path: tests/Unit/TruckDelivery.Payment.Domain.Tests/TruckDelivery.Payment.Domain.Tests.csproj
            trx: payment-results.trx
          - project: Notification.Domain
            path: tests/Unit/TruckDelivery.Notification.Domain.Tests/TruckDelivery.Notification.Domain.Tests.csproj
            trx: notification-results.trx
          - project: Tracking.Domain
            path: tests/Unit/TruckDelivery.Tracking.Domain.Tests/TruckDelivery.Tracking.Domain.Tests.csproj
            trx: tracking-results.trx
          - project: Analytics.Domain
            path: tests/Unit/TruckDelivery.Analytics.Domain.Tests/TruckDelivery.Analytics.Domain.Tests.csproj
            trx: analytics-results.trx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & build ${{ matrix.project }}
        run: |
          dotnet restore ${{ matrix.path }}
          dotnet build ${{ matrix.path }} --no-restore -c Release

      - name: Test ${{ matrix.project }}
        run: |
          dotnet test ${{ matrix.path }} \
            --no-build -c Release \
            --logger "trx;LogFileName=${{ matrix.trx }}" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ matrix.project }}
          path: '**/${{ matrix.trx }}'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.project }}
          path: '**/coverage.cobertura.xml'
