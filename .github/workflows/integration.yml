name: Integration & Contract Tests

on:
  push:
    branches: [develop, main, master]
  pull_request:
    branches: [develop, main, master]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & build
        run: |
          dotnet restore tests/Contract/TruckDelivery.Contracts.Tests/TruckDelivery.Contracts.Tests.csproj
          dotnet build tests/Contract/TruckDelivery.Contracts.Tests/TruckDelivery.Contracts.Tests.csproj --no-restore -c Release

      - name: Run contract tests
        run: |
          dotnet test tests/Contract/TruckDelivery.Contracts.Tests/TruckDelivery.Contracts.Tests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=contract-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: '**/contract-results.trx'

  integration-tests:
    name: Integration Tests — ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false        # all projects report independently
      matrix:
        include:
          - project: Order
            path: tests/Integration/TruckDelivery.Order.Application.IntegrationTests/TruckDelivery.Order.Application.IntegrationTests.csproj
            trx: order-integration-results.trx
          - project: Shipment
            path: tests/Integration/TruckDelivery.Shipment.Application.IntegrationTests/TruckDelivery.Shipment.Application.IntegrationTests.csproj
            trx: shipment-integration-results.trx
          - project: Driver
            path: tests/Integration/TruckDelivery.Driver.Application.IntegrationTests/TruckDelivery.Driver.Application.IntegrationTests.csproj
            trx: driver-integration-results.trx
          - project: Payment
            path: tests/Integration/TruckDelivery.Payment.Application.IntegrationTests/TruckDelivery.Payment.Application.IntegrationTests.csproj
            trx: payment-integration-results.trx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Testcontainers uses Docker — pre-pull heavy images to reduce test time
      - name: Pre-pull Docker images
        run: |
          docker pull mysql:8.0 &
          docker pull mongo:7.0 &
          docker pull redis:7-alpine &
          wait

      - name: Restore & build ${{ matrix.project }} integration tests
        run: |
          dotnet restore ${{ matrix.path }}
          dotnet build ${{ matrix.path }} --no-restore -c Release

      - name: Run integration tests — ${{ matrix.project }}
        run: |
          dotnet test ${{ matrix.path }} \
            --no-build -c Release \
            --logger "trx;LogFileName=${{ matrix.trx }}" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results-${{ matrix.project }}
          path: '**/${{ matrix.trx }}'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-coverage-${{ matrix.project }}
          path: '**/coverage.cobertura.xml'
